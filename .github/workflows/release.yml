name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  bundle:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        # Full history + tags: git-cliff needs them to walk commits
        # between the previous and the current tag.
        with:
          fetch-depth: 0

      # Turn conventional commits since the last tag into a Markdown
      # changelog. The output file is fed into tauri-action as the
      # release body, so the draft already arrives with release notes.
      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG_FRAGMENT.md

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      # Build the elevated helper first so src-tauri/build.rs can stage it as
      # a sidecar (`binaries/madistack-system-helper-<triple>.exe`) for the
      # Tauri bundler's externalBin pipeline.
      - name: Build system-helper (release)
        run: cargo build --release -p madistack-system-helper

      - name: Build & bundle
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri's auto-updater ships signed NSIS installers. These two
          # secrets must be set in the repo for `latest.json` (the feed
          # the in-app "Check for updates" button reads) to be generated.
          # Generate once with `cargo tauri signer generate -w key.pem`:
          #   TAURI_SIGNING_PRIVATE_KEY      → contents of key.pem
          #   TAURI_SIGNING_PRIVATE_KEY_PASSWORD → password used on generation
          # The matching public key goes in `src-tauri/tauri.conf.json`
          # under `plugins.updater.pubkey`.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MadiStack ${{ github.ref_name }}'
          releaseBody: ${{ steps.changelog.outputs.content }}
          releaseDraft: true
          prerelease: false
          # Requires the two TAURI_SIGNING_* secrets above to be set.
          # If they're missing the build fails early — intentional, so
          # we don't silently ship an unsigned release that would then
          # break the in-app updater validation on user machines.
          includeUpdaterJson: true

      # Package the standalone binaries into a portable zip so users who
      # don't want the NSIS/MSI installer can just unzip + run. Both exes
      # MUST live in the same directory — `madistack.exe` launches
      # `madistack-system-helper.exe` from its own `current_exe().parent()`.
      - name: Package portable zip
        shell: pwsh
        # Minimal payload: just the two binaries. Docs live on GitHub and
        # inside the app's About tab — no reason to duplicate them inside
        # every portable download.
        run: |
          $stage = "dist/MadiStack-${{ github.ref_name }}-portable"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item target/release/madistack.exe                 $stage/
          Copy-Item target/release/madistack-system-helper.exe   $stage/
          $zip = "dist/MadiStack_${{ github.ref_name }}_x64-portable.zip"
          Compress-Archive -Path "$stage/*" -DestinationPath $zip -Force
          Write-Host "Built $zip"

      - name: Upload portable zip to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} "dist/MadiStack_${{ github.ref_name }}_x64-portable.zip" --clobber
