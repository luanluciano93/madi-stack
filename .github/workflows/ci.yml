name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace

  frontend:
    name: Frontend (lint, typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm check

      - run: pnpm build

  build-app:
    name: Tauri bundle (Windows)
    runs-on: windows-latest
    needs: [rust, frontend]
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      # tauri-cli isn't a rustup component — have to install the cargo
      # subcommand explicitly on the runner. `--locked` guarantees the
      # same version dev machines use (pinned via Cargo.lock).
      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.0" --locked

      # Build the elevated helper first so src-tauri/build.rs can stage
      # it as the `externalBin` sidecar — without this the Tauri build
      # fails with "resource path ... doesn't exist" before linking.
      - name: Build system-helper
        run: cargo build -p madistack-system-helper

      - name: Build Tauri app
        run: cargo tauri build --no-bundle
